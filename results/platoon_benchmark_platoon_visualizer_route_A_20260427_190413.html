<style>

    background: var(--bg);
    color: var(--text);

    min-height: 100vh;
    padding: 40px 32px;
  }
  .header { text-align: center; margin-bottom: 36px; position: relative; }
  .header::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    z-index: 0;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e0f0ff 30%, #7eb8f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    position: relative;
    background-color: var(--bg);
    padding: 0 20px;
    z-index: 1;
  }
  .header p {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .metrics {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .metric-title { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
  .metric-row { display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.74rem; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; letter-spacing: 0.08em; }
  .legend-dot { width: 28px; height: 2.5px; border-radius: 2px; }
  .legend-dot.dashed {
    background: repeating-linear-gradient(90deg, var(--ref) 0, var(--ref) 5px, transparent 5px, transparent 10px);
    height: 2px;
  }
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 20px 16px;
    position: relative;
    overflow: hidden;
  }
  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--border), rgba(56,189,248,0.3), var(--border));
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .chart-title span { color: var(--text); }
  canvas { display: block; }
  @media (max-width: 900px) {
    .metrics { grid-template-columns: 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.full { grid-column: 1; }
  }
  @media (max-width: 700px) {
    body { padding: 20px 12px; }
    .header h1 { font-size: 1.3rem; }
  }
</style>

const METRICS = [{"vehicle":"vehicle_0","mae":0.065,"rmse":0.071,"mean_speed":2.913,"max_over":-0.019},{"vehicle":"vehicle_1","mae":0.151,"rmse":0.223,"mean_speed":2.908,"max_over":0.248},{"vehicle":"vehicle_2","mae":0.187,"rmse":0.319,"mean_speed":2.906,"max_over":0.352}];
const COLORS = { vehicle_0:'#4fc3f7', vehicle_1:'#ffb74d', vehicle_2:'#ce93d8' };

const metricRoot = document.getElementById('metrics');
for (const m of METRICS) {
  const card = document.createElement('div');
  card.className = 'metric-card';
  card.innerHTML = `
    <div class="metric-title">${m.vehicle} (moving phase)</div>
    <div class="metric-row">
      <span>MAE: ${m.mae}</span>
      <span>RMSE: ${m.rmse}</span>
      <span>Mean v: ${m.mean_speed}</span>
      <span>Max overshoot: ${m.max_over}</span>
    </div>`;
  metricRoot.appendChild(card);
}

const baseOpts = {
  responsive: true,
  interaction: { mode: 'index', intersect: false },
  animation: { duration: 700, easing: 'easeOutQuart' },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: 'rgba(13,20,32,0.96)',
      borderColor: '#1a2540',
      borderWidth: 1,
      titleFont: { family: 'JetBrains Mono', size: 11 },
      bodyFont: { family: 'JetBrains Mono', size: 11 },
      padding: 10,
    }
  },
  scales: {
    x: {
      type: 'linear',
      grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
      ticks: { color: '#4a6080', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 8 },
      border: { color: '#1a2540' }
    },
    y: {
      grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
      ticks: { color: '#4a6080', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 7 },
      border: { color: '#1a2540' }
    }
  }
};

function toXY(xArr,yArr) { return xArr.map((x,i)=>({x,y:yArr[i]})); }
function line(vid, yArr, label=null, dash=[]) {
  return {
    label: label || vid,
    data: toXY(DATA[vid].t, yArr),
    borderColor: COLORS[vid],
    backgroundColor: 'transparent',
    borderWidth: 1.8,
    pointRadius: 0,
    borderDash: dash,
    tension: 0.28,
  };
}

// Speed
{
  const ds = [
    {
      label: 'reference(v0)',
      data: toXY(DATA.vehicle_0.t, DATA.vehicle_0.speed_ref),
      borderColor: 'rgba(255,255,255,0.45)',
      borderWidth: 1.4,
      pointRadius: 0,
      borderDash: [5,4],
      tension: 0.2,
    },
    line('vehicle_0', DATA.vehicle_0.speed_now),
    line('vehicle_1', DATA.vehicle_1.speed_now),
    line('vehicle_2', DATA.vehicle_2.speed_now),
  ];
  new Chart(document.getElementById('speedChart'), {
    type: 'line', data: { datasets: ds },
    options: { ...baseOpts, scales: { ...baseOpts.scales,
      x: { ...baseOpts.scales.x, title: { display:true, text:'t (s)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } },
      y: { ...baseOpts.scales.y, title: { display:true, text:'Speed (m/s)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } }
    } }
  });
}

// Gap
{
  const ds = [
    {
      label: 'desired_gap',
      data: toXY(DATA.vehicle_1.t, DATA.vehicle_1.desired_gap),
      borderColor: 'rgba(255,255,255,0.45)',
      borderWidth: 1.4,
      pointRadius: 0,
      borderDash: [5,4],
      tension: 0.2,
    },
    line('vehicle_1', DATA.vehicle_1.gap, 'gap01'),
    line('vehicle_2', DATA.vehicle_2.gap, 'gap12'),
  ];
  new Chart(document.getElementById('gapChart'), {
    type: 'line', data: { datasets: ds },
    options: { ...baseOpts, scales: { ...baseOpts.scales,
      x: { ...baseOpts.scales.x, title: { display:true, text:'t (s)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } },
      y: { ...baseOpts.scales.y, title: { display:true, text:'Net Gap (m)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } }
    } }
  });
}

// Steer
{
  const ds = [line('vehicle_0', DATA.vehicle_0.steer), line('vehicle_1', DATA.vehicle_1.steer), line('vehicle_2', DATA.vehicle_2.steer)];
  new Chart(document.getElementById('steerChart'), {
    type: 'line', data: { datasets: ds },
    options: { ...baseOpts, scales: { ...baseOpts.scales,
      x: { ...baseOpts.scales.x, title: { display:true, text:'t (s)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } },
      y: { ...baseOpts.scales.y, suggestedMin:-1, suggestedMax:1, title: { display:true, text:'Steer [-1,1]', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } }
    } }
  });
}

// Accel
{
  const ds = [line('vehicle_0', DATA.vehicle_0.accel), line('vehicle_1', DATA.vehicle_1.accel), line('vehicle_2', DATA.vehicle_2.accel)];

// Throttle / Brake
{
  const ds = [
    line('vehicle_0', DATA.vehicle_0.throttle, 'v0 throttle'),
    line('vehicle_1', DATA.vehicle_1.throttle, 'v1 throttle'),
    line('vehicle_2', DATA.vehicle_2.throttle, 'v2 throttle'),
    { label:'v0 brake', data:toXY(DATA.vehicle_0.t, DATA.vehicle_0.brake), borderColor:'rgba(79,195,247,0.45)', backgroundColor:'transparent', pointRadius:0, borderWidth:1.2, borderDash:[4,4], tension:0.2 },
    { label:'v1 brake', data:toXY(DATA.vehicle_1.t, DATA.vehicle_1.brake), borderColor:'rgba(255,183,77,0.45)', backgroundColor:'transparent', pointRadius:0, borderWidth:1.2, borderDash:[4,4], tension:0.2 },
    { label:'v2 brake', data:toXY(DATA.vehicle_2.t, DATA.vehicle_2.brake), borderColor:'rgba(206,147,216,0.45)', backgroundColor:'transparent', pointRadius:0, borderWidth:1.2, borderDash:[4,4], tension:0.2 },
  ];
  new Chart(document.getElementById('cmdChart'), {
    type: 'line', data: { datasets: ds },
    options: { ...baseOpts, scales: { ...baseOpts.scales,

      y: { ...baseOpts.scales.y, suggestedMin:0, suggestedMax:1, title: { display:true, text:'Command [0,1]', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } }
    } }
  });
}

// Yaw err
{
  const ds = [
    { label:'zero', data: DATA.vehicle_0.t.map(x=>({x, y:0})), borderColor:'rgba(255,255,255,0.18)', borderDash:[3,4], borderWidth:1, pointRadius:0, tension:0, backgroundColor:'transparent' },
    line('vehicle_0', DATA.vehicle_0.yaw_err_deg),
    line('vehicle_1', DATA.vehicle_1.yaw_err_deg),
    line('vehicle_2', DATA.vehicle_2.yaw_err_deg),
  ];
  new Chart(document.getElementById('yawChart'), {
    type: 'line', data: { datasets: ds },
    options: { ...baseOpts, scales: { ...baseOpts.scales,
      x: { ...baseOpts.scales.x, title: { display:true, text:'t (s)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } },
      y: { ...baseOpts.scales.y, title: { display:true, text:'Yaw Error (deg)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } }
    } }
  });
}

// Trajectory
{
  const ds = [
    { label:'vehicle_0', data: toXY(DATA.vehicle_0.traj_x, DATA.vehicle_0.traj_y), borderColor:COLORS.vehicle_0, borderWidth:2, pointRadius:0, showLine:true, tension:0.2 },
    { label:'vehicle_1', data: toXY(DATA.vehicle_1.traj_x, DATA.vehicle_1.traj_y), borderColor:COLORS.vehicle_1, borderWidth:2, pointRadius:0, showLine:true, tension:0.2 },
    { label:'vehicle_2', data: toXY(DATA.vehicle_2.traj_x, DATA.vehicle_2.traj_y), borderColor:COLORS.vehicle_2, borderWidth:2, pointRadius:0, showLine:true, tension:0.2 },
  ];
  new Chart(document.getElementById('trajChart'), {
    type: 'scatter',
    data: { datasets: ds },
    options: {
      ...baseOpts,
      aspectRatio: 2.6,
      interaction: { mode: 'nearest', intersect: false },
      scales: {
        x: { ...baseOpts.scales.x, title: { display:true, text:'X (m)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } },
        y: { ...baseOpts.scales.y, title: { display:true, text:'Y (m)', color:'#4a6080', font:{family:'JetBrains Mono', size:10} } }
      }
    }
  });
}
